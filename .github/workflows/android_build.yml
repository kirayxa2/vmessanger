name: Remote Android Build
on:
  push:
    branches: [ main, master ] # Сработает при пуше в эти ветки

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Next.js Static Export
        # Здесь GitHub сам сделает тот самый тяжелый билд
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/android

      - name: Sync Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android
          # Проверяем, существует ли папка android. Если нет — добавляем её.
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Копируем билд Next.js (папка out) в Android проект
          npx cap sync android

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Messenger-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
