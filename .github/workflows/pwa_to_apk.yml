name: Build Android APK (TWA)
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Build PWA
        run: npm run build
        
      - name: Setup Android SDK & Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        # Мы создаем конфиг "на лету", чтобы не вводить данные вручную
        run: |
          bubblewrap init --manifest=https://vmessanger-production.up.railway.app/manifest.json
          bubblewrap build --skipSigning
        # --skipSigning создаст нам отладочный APK (debug), который можно сразу ставить

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ./*.apk