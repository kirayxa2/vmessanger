name: Build Android APK (TWA)

on:
  push:
    branches: [main]

jobs:
  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate Android TWA project
        run: |
          set -e
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main/java/com/vortexmessenger/app
          mkdir -p android/app/src/main/res/values

          cat > android/settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              namespace 'com.vortexmessenger.app'
              defaultConfig {
                  applicationId "com.vortexmessenger.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          EOF

          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <application
                  android:label="@string/app_name"
                  android:allowBackup="true">
                  <activity
                      android:name="com.vortexmessenger.app.MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden|keyboard"
                      android:windowSoftInputMode="adjustPan">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # colors.xml — цвет статус-бара
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1c242f</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Vortex Messenger</string>
              <string name="asset_statements">
                  [{"relation": ["delegate_permission/common.handle_all_urls"],
                  "target": {"namespace": "web",
                  "site": "https://vmessanger-production.up.railway.app"}}]
              </string>
          </resources>
          EOF

          # MainActivity с WebView + полная поддержка file chooser
          cat > android/app/src/main/java/com/vortexmessenger/app/MainActivity.java << 'EOF'
          package com.vortexmessenger.app;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.DialogInterface;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.PermissionRequest;
          import android.view.KeyEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.graphics.Color;
          import android.os.Build;
          import android.Manifest;

          public class MainActivity extends Activity {
              private WebView webView;
              private static final String APP_URL = "https://vmessanger.onrender.com";
              private static final int FILE_CHOOSER_REQUEST = 1001;
              private static final int PERMISSION_REQUEST_CODE = 1002;

              private ValueCallback<Uri[]> filePathCallback;
              // Сохраняем WebRTC PermissionRequest пока ждём Android-разрешения
              private PermissionRequest pendingWebRTCRequest;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      getWindow().setStatusBarColor(Color.parseColor("#1c242f"));
                      getWindow().setNavigationBarColor(Color.parseColor("#1c242f"));
                  }

                  // Включаем аппаратное ускорение — обязательно для WebRTC
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_HARDWARE_ACCELERATED,
                      WindowManager.LayoutParams.FLAG_HARDWARE_ACCELERATED
                  );

                  WebView.setWebContentsDebuggingEnabled(true);
                  webView = new WebView(this);
                  webView.setLayerType(android.view.View.LAYER_TYPE_HARDWARE, null);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  // КРИТИЧНО для WebRTC: медиа без жеста пользователя
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  // Позволяем JS из одного origin обращаться к другому (нужно для WebRTC STUN)
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setUserAgentString(settings.getUserAgentString() + " VortexApp/1.0");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url.startsWith("https://vmessanger.onrender.com")) {
                              view.loadUrl(url);
                              return true;
                          }
                          return false;
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {

                      @Override
                      public boolean onShowFileChooser(
                              WebView webView,
                              ValueCallback<Uri[]> filePathCallback,
                              FileChooserParams fileChooserParams) {
                          if (MainActivity.this.filePathCallback != null) {
                              MainActivity.this.filePathCallback.onReceiveValue(null);
                          }
                          MainActivity.this.filePathCallback = filePathCallback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("*/*");
                          startActivityForResult(Intent.createChooser(intent, "Выберите файл"), FILE_CHOOSER_REQUEST);
                          return true;
                      }

                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          // Проверяем есть ли уже Android-разрешения
                          boolean audioGranted = checkSelfPermission(Manifest.permission.RECORD_AUDIO)
                              == PackageManager.PERMISSION_GRANTED;
                          boolean cameraGranted = checkSelfPermission(Manifest.permission.CAMERA)
                              == PackageManager.PERMISSION_GRANTED;

                          boolean needAudio = false;
                          boolean needCamera = false;
                          for (String res : request.getResources()) {
                              if (res.equals(PermissionRequest.RESOURCE_AUDIO_CAPTURE)) needAudio = true;
                              if (res.equals(PermissionRequest.RESOURCE_VIDEO_CAPTURE)) needCamera = true;
                          }

                          // Если нужные Android-разрешения уже есть — сразу grant
                          boolean canGrant = (!needAudio || audioGranted) && (!needCamera || cameraGranted);
                          if (canGrant) {
                              request.grant(request.getResources());
                              return;
                          }

                          // Иначе — запрашиваем Android-разрешения, потом grant
                          pendingWebRTCRequest = request;
                          java.util.List<String> permsNeeded = new java.util.ArrayList<>();
                          if (needAudio && !audioGranted) permsNeeded.add(Manifest.permission.RECORD_AUDIO);
                          if (needCamera && !cameraGranted) permsNeeded.add(Manifest.permission.CAMERA);
                          permsNeeded.add(Manifest.permission.MODIFY_AUDIO_SETTINGS);
                          requestPermissions(permsNeeded.toArray(new String[0]), PERMISSION_REQUEST_CODE);
                      }
                  });

                  if (savedInstanceState != null) {
                      webView.restoreState(savedInstanceState);
                  } else {
                      webView.loadUrl(APP_URL);
                  }

                  // Запрашиваем разрешения сразу при старте
                  requestAllPermissions();
              }

              private void requestAllPermissions() {
                  String[] perms = {
                      Manifest.permission.RECORD_AUDIO,
                      Manifest.permission.CAMERA,
                      Manifest.permission.MODIFY_AUDIO_SETTINGS
                  };
                  java.util.List<String> needed = new java.util.ArrayList<>();
                  for (String p : perms) {
                      if (checkSelfPermission(p) != PackageManager.PERMISSION_GRANTED) {
                          needed.add(p);
                      }
                  }
                  if (!needed.isEmpty()) {
                      requestPermissions(needed.toArray(new String[0]), PERMISSION_REQUEST_CODE);
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE && pendingWebRTCRequest != null) {
                      // После выдачи Android-разрешений — подтверждаем WebRTC запрос
                      final PermissionRequest req = pendingWebRTCRequest;
                      pendingWebRTCRequest = null;
                      new Handler(Looper.getMainLooper()).post(new Runnable() {
                          @Override public void run() {
                              req.grant(req.getResources());
                          }
                      });
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == FILE_CHOOSER_REQUEST) {
                      if (filePathCallback == null) return;
                      Uri[] results = null;
                      if (resultCode == Activity.RESULT_OK && data != null) {
                          String dataString = data.getDataString();
                          if (dataString != null) results = new Uri[]{ Uri.parse(dataString) };
                      }
                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                      webView.goBack();
                      return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              protected void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  webView.saveState(outState);
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  webView.onResume();
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  webView.onPause();
              }
          }
          EOF

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Install Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Create gradlew shim
        run: |
          cat > android/gradlew << 'GRADLEW'
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x android/gradlew

      # Восстанавливаем стабильный keystore из GitHub Secret
      # Это гарантирует что SHA-256 всегда один и тот же
      - name: Restore debug keystore from secret
        run: |
          mkdir -p "$HOME/.android"
          if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > "$HOME/.android/debug.keystore"
            echo "Keystore restored from secret"
          else
            # Первый раз — генерируем и показываем base64 для сохранения в secret
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo ""
            echo "======================================================"
            echo "SAVE THIS AS GitHub Secret DEBUG_KEYSTORE_BASE64:"
            echo "======================================================"
            base64 -w 0 "$HOME/.android/debug.keystore"
            echo ""
            echo "======================================================"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-8.2
          restore-keys: gradle-${{ runner.os }}-

      - name: Show keystore SHA-256
        run: |
          keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | grep -A1 "SHA256"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vortex-messenger-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
