name: Build Android APK (TWA)

on:
  push:
    branches: [main]

jobs:
  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для git push assetlinks.json
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate Android TWA project
        run: |
          set -e
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main/java/com/vortexmessenger/app
          mkdir -p android/app/src/main/res/values

          cat > android/settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              namespace 'com.vortexmessenger.app'
              defaultConfig {
                  applicationId "com.vortexmessenger.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="@string/app_name"
                  android:theme="@android:style/Theme.NoTitleBar"
                  android:allowBackup="true">
                  <activity
                      android:name="com.vortexmessenger.app.LauncherActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="asset_statements"
                      android:value="@string/asset_statements" />
              </application>
          </manifest>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Vortex Messenger</string>
              <string name="asset_statements">
                  [{"relation": ["delegate_permission/common.handle_all_urls"],
                  "target": {"namespace": "web",
                  "site": "https://vmessanger-production.up.railway.app"}}]
              </string>
          </resources>
          EOF

          cat > android/app/src/main/java/com/vortexmessenger/app/LauncherActivity.java << 'EOF'
          package com.vortexmessenger.app;
          public class LauncherActivity extends com.google.androidbrowserhelper.trusted.LauncherActivity {}
          EOF

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download Gradle wrapper jar
        run: |
          curl -sL \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Create gradlew
        run: |
          cat > android/gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME=$(cd "$(dirname "$0")" && pwd)
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          if [ -n "$JAVA_HOME" ]; then
            JAVACMD="$JAVA_HOME/bin/java"
          else
            JAVACMD="java"
          fi
          exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-8.2
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Извлекаем SHA-256 из debug keystore и пишем assetlinks.json ──
      - name: Extract debug keystore SHA-256 & update assetlinks.json
        run: |
          # Debug keystore создаётся автоматически при первом gradle build
          KEYSTORE="$HOME/.android/debug.keystore"

          # Если нет — создаём стандартный Android debug keystore
          if [ ! -f "$KEYSTORE" ]; then
            mkdir -p "$HOME/.android"
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # Извлекаем SHA-256
          SHA256=$(keytool -list -v \
            -keystore "$KEYSTORE" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null \
            | grep "SHA256:" \
            | head -1 \
            | sed 's/.*SHA256: //' \
            | tr -d ' \t\r\n')

          echo "SHA-256: $SHA256"

          # Записываем assetlinks.json
          mkdir -p public/.well-known
          cat > public/.well-known/assetlinks.json << ASSETEOF
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.vortexmessenger.app",
              "sha256_cert_fingerprints": ["$SHA256"]
            }
          }]
          ASSETEOF

          echo "assetlinks.json written:"
          cat public/.well-known/assetlinks.json

      # ── Коммитим assetlinks.json обратно в репо ──
      - name: Commit assetlinks.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/.well-known/assetlinks.json
          # Коммитим только если файл изменился
          git diff --staged --quiet || git commit -m "ci: update assetlinks.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vortex-messenger-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
